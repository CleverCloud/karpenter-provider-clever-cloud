# See https://docs.github.com/en/github/administering-a-repository/configuration-options-for-dependency-updates#package-ecosystem
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      # "chore(deps): ..." — keeps Dependabot PRs green on the conventional-commit CI check.
      prefix: "chore"
      include: "scope"
    groups:
      # Group updates together, so that they are all applied in a single PR.
      # sigs.k8s.io/karpenter gets its own group: its bumps also move the
      # vendored karpenter.sh CRDs (make generate syncs them from the module,
      # and CI stays red until a maintainer pushes the fix-up), and its minor
      # must match the published K8s compatibility matrix — see the upgrade
      # playbook in CONTRIBUTING.md. operatorpkg rides along: it defines the
      # status.Object contract karpenter's API types implement and must move
      # in lockstep.
      karpenter:
        patterns:
          - "sigs.k8s.io/karpenter"
          - "github.com/awslabs/operatorpkg"
      k8s-go-deps:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
        exclude-patterns:
          - "sigs.k8s.io/karpenter"
      go-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          - "github.com/awslabs/operatorpkg"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions-deps:
        patterns:
          - "*"
  # Composite actions are not picked up by the root github-actions entry;
  # each action directory needs its own entry.
  # https://github.com/dependabot/dependabot-core/issues/6704
  - package-ecosystem: "github-actions"
    directory: ".github/actions/install-deps"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      action-deps:
        patterns:
          - "*"
