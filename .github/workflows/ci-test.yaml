name: CI-TEST
on:
  push:
    branches:
      - 'main'
      - 'master'
      - 'release-v*'
  pull_request:
  workflow_dispatch:
jobs:
  ci-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: ./.github/actions/install-deps
    - run: make test
    - name: Run tests with race detector
      run: go test -race ./pkg/... ./cmd/...
