name: CI-TEST
on:
  push:
    branches:
      - 'main'
      - 'master'
      - 'release-v*'
  pull_request:
  workflow_dispatch:
jobs:
  ci-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ./.github/actions/install-deps
    - run: make test
    - name: Run tests with race detector
      run: go test -race ./pkg/... ./cmd/...
