name: CI-LINT
on:
  push:
    branches:
      - 'main'
      - 'master'
      - 'release-v*'
  pull_request:
  workflow_dispatch:
jobs:
  ci-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read # golangci/golangci-lint-action
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - uses: ./.github/actions/install-deps
    - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        # Keep in sync with GOLANGCI_LINT_VERSION in the Makefile
        version: v2.12.2
