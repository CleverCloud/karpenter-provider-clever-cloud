name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image and Helm charts to ghcr.io
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # The in-tree Chart.yaml values are placeholders (overridden at package time), but a
      # bare git-tree `helm install` and the generated deploy/karpenter.yaml resolve the
      # image tag from appVersion — fail the release early if they lag the tag.
      - name: Verify chart placeholders match the release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          rc=0
          for f in charts/karpenter/Chart.yaml charts/karpenter-crd/Chart.yaml; do
            version=$(sed -n 's/^version: //p' "$f")
            appVersion=$(sed -n 's/^appVersion: //p' "$f")
            if [ "$appVersion" != "$TAG" ] || [ "v$version" != "$TAG" ]; then
              echo "::error file=$f::version=$version appVersion=$appVersion do not match tag $TAG — bump the placeholders (and run 'make raw-manifest') in the release commit."
              rc=1
            fi
          done
          exit $rc
      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Build and push image
        run: |
          # ghcr.io requires a lowercase repository name
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/karpenter"
          TAG="${GITHUB_REF_NAME}"
          make image IMAGE="$IMAGE" TAG="$TAG"
          docker push "$IMAGE:$TAG"
      # The chart steps only run for v* tags: a workflow_dispatch run from a branch
      # has a non-semver GITHUB_REF_NAME that helm package would reject.
      - name: Log Helm in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # docker login above does not authenticate helm: helm keeps its own
        # registry credential store, separate from docker's config.json.
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      - name: Package and push Helm charts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # ghcr.io requires a lowercase repository name; helm push appends
          # the chart name, so charts land at <repo>/karpenter[-crd].
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          TAG="${GITHUB_REF_NAME}"
          make chart-package TAG="$TAG"
          helm push "dist/karpenter-crd-${TAG#v}.tgz" "oci://$REPO"
          helm push "dist/karpenter-${TAG#v}.tgz" "oci://$REPO"
