# Mirrors the golangci-lint v2 configuration used across Clever Cloud Go
# repositories (e.g. CleverCloud/terraform-provider-clevercloud): the default
# linter set (errcheck, govet, ineffassign, staticcheck, unused) with the
# standard exclusion presets. zz_generated.deepcopy.go files are skipped via
# their "Code generated by controller-gen" headers.
version: "2"
linters:
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
