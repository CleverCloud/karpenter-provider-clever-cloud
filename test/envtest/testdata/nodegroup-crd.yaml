# Test fixture ONLY. The real nodegroups.api.clever-cloud.com CRD is owned
# and installed by Clever Cloud on every CKE cluster; it is deliberately not
# vendored in this repository. This fixture mirrors just enough of its shape
# (cluster-scoped, v1, status subresource, loose schema) for the controllers
# to exercise a real apiserver in envtest. Keep it loose: the provider's typed
# client is deliberately tolerant of fields the Clever Cloud operator owns.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodegroups.api.clever-cloud.com
spec:
  group: api.clever-cloud.com
  names:
    kind: NodeGroup
    listKind: NodeGroupList
    plural: nodegroups
    singular: nodegroup
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
