# -- Overrides the chart name used in resource names.
nameOverride: ""
# -- Overrides the full resource name prefix.
fullnameOverride: ""
# -- Additional labels added to every chart resource.
additionalLabels: {}

image:
  # -- Controller image repository. Official images are published to ghcr.io
  # by the release workflow on every v* tag.
  repository: ghcr.io/clevercloud/karpenter
  # -- Image tag. Defaults to the chart appVersion.
  tag: ""
  # -- Image digest; takes precedence over tag when set.
  digest: ""

imagePullPolicy: IfNotPresent
imagePullSecrets: []

serviceAccount:
  # -- Create the service account.
  create: true
  # -- Service account name (generated from the chart name when empty).
  name: ""
  annotations: {}

# -- Number of controller replicas. Leader election keeps one active.
replicas: 1
revisionHistoryLimit: 10

podLabels: {}
podAnnotations: {}
podSecurityContext:
  fsGroup: 65532

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

priorityClassName: system-cluster-critical

# -- The controller must run on nodes Karpenter does not manage; CKE
# control-plane nodes are schedulable and fit that role.
nodeSelector:
  clever-cloud.com/cluster-node-role: control-plane

tolerations: []
affinity: {}
topologySpreadConstraints: []

controller:
  metrics:
    port: 8080
  healthProbe:
    port: 8081
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      memory: 512Mi
  # -- Extra environment variables for the controller container.
  env: []

settings:
  # -- Clever Cloud region/zone advertised on instance types (CKE is
  # Paris-only today).
  region: par
  # -- Log verbosity: debug, info or error.
  logLevel: info
  # -- Disable leader election (useful for single-replica dev setups).
  disableLeaderElection: false
  # -- Maximum/idle batching windows for pod batching before provisioning.
  batchMaxDuration: 10s
  batchIdleDuration: 1s
  featureGates:
    # -- Enable Karpenter's node auto-repair (acts on the provider's
    # RepairPolicies: NodeReady False/Unknown tolerated 10m).
    nodeRepair: false
  # -- Per-flavor overrides overlaid on top of the base catalogue (the built-in
  # 2XS…XL seed, or the dynamic refresher's result when `pricing.enabled`).
  # Leave empty to use the base catalogue unchanged. Each entry needs a `name`
  # (as accepted by the Clever Cloud NodeGroup API, uppercase); `cpu` (vCPUs),
  # `memoryKi` (kernel-visible memory in KiB) and `priceHourly` (EUR/hour) are
  # OPTIONAL — set only the fields you want to pin, the rest fall through to the
  # base value. A name absent from the base/seed must supply all three fields.
  # Overrides always win and are re-applied after every dynamic refresh.
  # CPU/memory still self-correct at runtime from observed node capacity.
  # Rendered into a ConfigMap mounted in the controller.
  # Example (pin only M's price, leave everything else dynamic/default):
  #   flavors:
  #     - name: M
  #       priceHourly: 0.1167
  flavors: []
  # -- Optional background refresher that pulls CKE flavor prices and the
  # available-flavor list (for `topology`) from Clever Cloud's PUBLIC,
  # unauthenticated HTTP API every `refreshPeriod`. DISABLED by default:
  # enabling it opens outbound HTTPS (TCP 443) from the controller to `apiURL` —
  # the ONLY case where the controller talks to a Clever Cloud HTTP endpoint;
  # every other operation stays in-cluster. No API token is required. The
  # `flavors` overrides above are re-applied on top of each refresh.
  pricing:
    # -- Enable the dynamic price/flavor refresher. Requires egress to `apiURL`.
    enabled: false
    # -- How often to refresh prices and the available-flavor list.
    refreshPeriod: 12h
    # -- Base URL of the Clever Cloud public API, used for both endpoints below.
    # Override for an egress proxy or testing.
    apiURL: https://api.clever-cloud.com
    # -- Optionally override the FULL URL of an individual endpoint (each
    # defaults to `apiURL` + its standard path). Use these only when the two
    # public APIs must point at different hosts/paths (e.g. a proxy that exposes
    # them separately); leave empty to derive both from `apiURL`.
    kubernetesProductURL: ""
    priceSystemURL: ""
    # -- CKE topology whose available-flavor list is fetched (e.g. DISTRIBUTED,
    # DEDICATED_COMPUTE, ALL_IN_ONE).
    topology: DISTRIBUTED

service:
  # -- Expose the metrics endpoint through a ClusterIP service.
  enabled: true
  annotations: {}
