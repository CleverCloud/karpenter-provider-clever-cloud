apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karpenter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karpenter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "karpenter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "karpenter.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations .Values.settings.flavors }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.settings.flavors }}
        checksum/flavors: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | quote }}
        {{- end }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "karpenter.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "karpenter.controller.image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: CLEVER_CLOUD_REGION
              value: {{ .Values.settings.region | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.settings.logLevel | quote }}
            - name: METRICS_PORT
              value: {{ .Values.controller.metrics.port | quote }}
            - name: HEALTH_PROBE_PORT
              value: {{ .Values.controller.healthProbe.port | quote }}
            - name: SYSTEM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEADER_ELECTION_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.settings.disableLeaderElection }}
            - name: DISABLE_LEADER_ELECTION
              value: "true"
            {{- end }}
            {{- with .Values.settings.batchMaxDuration }}
            - name: BATCH_MAX_DURATION
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.settings.batchIdleDuration }}
            - name: BATCH_IDLE_DURATION
              value: {{ . | quote }}
            {{- end }}
            - name: FEATURE_GATES
              value: "NodeRepair={{ .Values.settings.featureGates.nodeRepair }}"
            {{- if .Values.settings.flavors }}
            - name: FLAVORS_CONFIG_PATH
              value: /etc/karpenter/flavors/flavors.yaml
            {{- end }}
            {{- if .Values.settings.pricing.enabled }}
            - name: PRICING_REFRESH_ENABLED
              value: "true"
            - name: PRICING_REFRESH_PERIOD
              value: {{ .Values.settings.pricing.refreshPeriod | quote }}
            - name: PRICING_API_URL
              value: {{ .Values.settings.pricing.apiURL | quote }}
            {{- with .Values.settings.pricing.kubernetesProductURL }}
            - name: PRICING_PRODUCT_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.settings.pricing.priceSystemURL }}
            - name: PRICING_PRICE_SYSTEM_URL
              value: {{ . | quote }}
            {{- end }}
            - name: CLEVER_CLOUD_TOPOLOGY
              value: {{ .Values.settings.pricing.topology | quote }}
            {{- end }}
            - name: MEMORY_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: controller
                  divisor: "0"
                  resource: limits.memory
            {{- with .Values.controller.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http-metrics
              containerPort: {{ .Values.controller.metrics.port }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.controller.healthProbe.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 30
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.settings.flavors }}
          volumeMounts:
            - name: flavors
              mountPath: /etc/karpenter/flavors
              readOnly: true
          {{- end }}
      {{- if .Values.settings.flavors }}
      volumes:
        - name: flavors
          configMap:
            name: {{ include "karpenter.fullname" . }}-flavors
      {{- end }}
